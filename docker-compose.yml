services:
  claire-kg-docker-graphrag:
    image: neo4j:5.26.12
    container_name: claire-kg-docker-graphrag
    restart: unless-stopped

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/graphrag-password

      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"

      # Reduced memory for read-only Docker distribution
      NEO4J_server_memory_heap_initial__size: 2g
      NEO4J_server_memory_heap_max__size: 4g
      NEO4J_server_memory_pagecache_size: 2g
      NEO4J_dbms_memory_transaction_total_max: 2g

      NEO4J_server_jvm_additional: -XX:+ExitOnOutOfMemoryError
      NEO4J_server_default__listen__address: "0.0.0.0"

    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000

    entrypoint: ["/entrypoint/neo4j-entrypoint.sh", "neo4j"]

    volumes:
      - claire-kg-docker-graphrag-data:/data
      - claire-kg-docker-graphrag-logs:/logs
      - claire-kg-docker-graphrag-import:/import
      - claire-kg-docker-graphrag-plugins:/plugins
      - ./backups:/backups:ro
      - ./docker:/entrypoint:ro

    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "graphrag-password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m

  app:
    image: ghcr.io/claire-kg/claire-kg-app:latest
    container_name: claire-kg-docker-app
    env_file: .env
    environment:
      NEO4J_URI: bolt://claire-kg-docker-graphrag:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: graphrag-password
    depends_on:
      claire-kg-docker-graphrag:
        condition: service_healthy

volumes:
  claire-kg-docker-graphrag-data:
    name: claire-kg-docker-graphrag-data
  claire-kg-docker-graphrag-logs:
    name: claire-kg-docker-graphrag-logs
  claire-kg-docker-graphrag-import:
    name: claire-kg-docker-graphrag-import
  claire-kg-docker-graphrag-plugins:
    name: claire-kg-docker-graphrag-plugins
